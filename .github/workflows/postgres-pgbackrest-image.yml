name: Postgres pgBackRest Image

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/postgres-pgbackrest-image.yml"
      - "docker/postgres-pgbackrest/**"
  pull_request:
    paths:
      - ".github/workflows/postgres-pgbackrest-image.yml"
      - "docker/postgres-pgbackrest/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-postgres-pgbackrest

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=personal-data-warehouse-postgres-pgbackrest
            org.opencontainers.image.description=Postgres with pgBackRest for S3-backed backups and WAL archiving

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: docker/postgres-pgbackrest
          file: docker/postgres-pgbackrest/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=postgres-pgbackrest
          cache-to: type=gha,mode=max,scope=postgres-pgbackrest
